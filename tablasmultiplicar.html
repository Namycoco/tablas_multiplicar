<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tablas de multiplicar</title>

<style>

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  color: white;
}

/* Fondo difuminado */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("imagen.jpg") center/cover no-repeat;
  filter: blur(5px) brightness(0.4);
  z-index: -1;
}

/* Título */
h1 {
  text-align: center;
  font-size: 55px;
  margin: 30px 0;
  color: white;
  font-weight: bold;
  letter-spacing: 1px;
}

/* Contenedor */
.contenedor {
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 20px;
}

/* Panel entrada */
.panel {
  background: rgba(255,255,255,0.97);
  color: #333;
  width: 420px;
  padding: 35px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

.panel h2 {
  margin-bottom: 15px;
}

/* Input */
input {
  padding: 16px;
  width: 100%;
  font-size: 18px;
  border-radius: 10px;
  border: 1px solid #ccc;
  outline: none;
  transition: 0.2s;
}

input:focus {
  border-color: #2196f3;
  box-shadow: 0 0 8px rgba(33,150,243,0.3);
}

/* Botón */
button {
  margin-top: 20px;
  padding: 15px;
  width: 100%;
  font-size: 17px;
  border-radius: 10px;
  border: none;
  background: #1e88e5;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #1565c0;
}

/* Resultados */
.resultados {
  background: rgba(0,0,0,0.75);
  width: 650px;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin-top: 20px;
}

/* Celdas */
.celda {
  padding: 18px;
  border-radius: 12px;
  text-align: center;
  font-size: 20px;
  font-weight: 500;

  background: linear-gradient(135deg, #e3f2fd, #bbdefb);
  color: #0d47a1;

  box-shadow: 0 5px 15px rgba(0,0,0,0.2);

  opacity: 0;
  transform: translateY(20px);
  animation: aparecer 0.3s forwards;
}

@keyframes aparecer {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
</head>

<body>

<h1>Tablas de multiplicar</h1>

<div class="contenedor">

  <!-- PANEL -->
  <div class="panel">
    <h2>Introduce un número</h2>
    <input type="number" id="numero" min="1" max="10">
    <button onclick="generarTabla()">Generar tabla</button>
  </div>

  <!-- RESULTADOS -->
  <div class="resultados">
    <h2>Resultados</h2>
    <div id="tabla" class="grid"></div>
  </div>

</div>

<script>

function generarTabla() {
  let valor = parseInt(document.getElementById("numero").value);
  let tablaDiv = document.getElementById("tabla");

  tablaDiv.innerHTML = "";

  if (isNaN(valor) || valor < 1 || valor > 10) {
    tablaDiv.innerHTML = "<p>⚠️ Introduce un número válido (1-10)</p>";
    return;
  }

  for (let i = 1; i <= 12; i++) {
    let resultado = valor * i;

    let celda = document.createElement("div");
    celda.classList.add("celda");

    celda.style.animationDelay = (i * 0.04) + "s";

    celda.innerText = `${valor} × ${i} = ${resultado}`;

    tablaDiv.appendChild(celda);
  }
}

</script>

</body>
</html>
